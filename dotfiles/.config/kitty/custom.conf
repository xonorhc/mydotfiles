# Add your custom configurations here

clone_source_strategies venv,conda,env_var,path
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard
map alt+e pipe @screen_scrollback overlay nvim - -c 'set filetype=scrollback'

# Tab bar
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"
tab_powerline_style slanted
tab_activity_symbol none
tab_title_template "{f'{title[:30]}…' if title.rindex(title[-1]) + 1 > 30 else (title.center(6) if (title.rindex(title[-1]) + 1) % 2 == 0 else title.center(5))}"
active_tab_title_template none
active_tab_font_style bold-italic
inactive_tab_font_style normal

# Keybindings
kitty_mod ctrl+shift
map kitty_mod+k scroll_line_up
map kitty_mod+j scroll_line_down
map kitty_mod+z scroll_to_prompt -1
map kitty_mod+x scroll_to_prompt 1
map kitty_mod+h show_scrollback
map kitty_mod+n new_os_window_with_cwd
map kitty_mod+enter new_window_with_cwd
map kitty_mod+t new_tab_with_cwd
map kitty_mod+w close_tab
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map kitty_mod+l next_layout
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+plus change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+kp_subtract change_font_size all -1.0
map kitty_mod+e launch --type=background --cwd=current sh -c 'hyprctl dispatch exec "[float; size 60% 60%; center 1] xdg-open" $(pwd)'
map kitty_mod+u launch --type=background --cwd=current sh -c 'uwsm app -- thunar "$(pwd)"'
map kitty_mod+y launch --type=overlay-main --cwd=current yazi
