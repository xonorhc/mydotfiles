colors:
  body: NONE
  date: RED
  tags: YELLOW
  title: CYAN
default_hour: 9
default_minute: 0
editor: nvim
encrypt: false
highlight: true
indent_character: " "
journals:
  default:
    journal: ~/.jrnl/journal.txt
    encrypt: true
    display_format: json
    editor: "vim -c 'set viminfo= noswapfile noundofile nobackup nowritebackup noshelltemp history=0 nomodeline secure'"
  study:
    journal: ~/.jrnl/studies/
    template: ~/.jrnl/templates/asciidoc.adoc
    editor: "nvim -c 'set shada= noswapfile noundofile nobackup nowritebackup noshelltemp history=0 nomodeline secure'"
  workout: ~/.jrnl/workouts.txt
  work: ~/.jrnl/work.md
linewrap: 79
tagsymbols: "#@"
template: false
timeformat: "%F %r"
version: v4.3
