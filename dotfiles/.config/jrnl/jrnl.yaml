colors:
  body: NONE
  date: RED
  tags: YELLOW
  title: CYAN
default_hour: 9
default_minute: 0
editor: nvim
encrypt: false
highlight: true
indent_character: ' '
journals:
  default:
    display_format: json
    editor: nvim -c 'set shada= noswapfile noundofile nobackup nowritebackup noshelltemp
      history=0 nomodeline secure'
    encrypt: true
    journal: ~/.jrnl/journal.txt
linewrap: 79
tagsymbols: '#@'
template: false
timeformat: '%F %r'
version: v4.2.1
