# : Manager [[[

[mgr]
cwd = { fg = "#ffffff" }

# Find
find_keyword  = { fg = "#ffd3cd", bold = true, italic = true, underline = true }
find_position = { fg = "#ffd3cd", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#ff748b", bg = "#ff748b" }
marker_cut      = { fg = "#ffdae0", bg = "#ffdae0" }
marker_marked   = { fg = "#ffd3cd", bg = "#ffd3cd" }
marker_selected = { fg = "#ffd2d9", bg = "#ffd2d9" }

# Count
count_copied   = { fg = "#3b0918", bg = "#ffdae0" }
count_cut      = { fg = "#3b0918", bg = "#ffdae0" }
count_selected = { fg = "#3d0e75", bg = "#ffd2d9" }

# Border
border_symbol = " "
border_style  = { fg = "#d8bbff" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }
current = { bg = "#bd93f9", fg = "#3d0e75", bold = true }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#e9d5ff", bold = true, bg = "#1e1e1e" }
inactive  = { fg = "#e6d8f2", bg = "#1e1e1e" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#e9d5ff", fg = "#3d0e75", bold = true }
normal_alt  = { bg = "#505050", fg = "#dddddd" }

# Select mode
select_main = { bg = "#e6d8f2", fg = "#342a42", bold = true }
select_alt  = { bg = "#505050", fg = "#dddddd" }

# Unset mode
unset_main = { bg = "#ffd2d9", fg = "#4e202c", bold = true }
unset_alt  = { bg = "#505050", fg = "#dddddd" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#9c65cc" }
perm_write = { fg = "#ff3958" }
perm_read  = { fg = "#ff4c34" }
perm_exec  = { fg = "#ff4160" }
perm_sep   = { fg = "#9e43ff" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#e9d5ff", bg = "#4d4d4d" }
progress_error  = { fg = "#ffd3cd", bg = "#4d4d4d" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#4d4d4d" }
cand = { fg = "#e9d5ff" }
rest = { fg = "#3d0e75" }
desc = { fg = "#ffffff" }
separator = " ▶ "
separator_style = { fg = "#ffffff" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#ffd2d9" }
title_warn  = { fg = "#e9d5ff" }
title_error = { fg = "#ffd3cd" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#e9d5ff" }
active = { fg = "#ffd2d9", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#e9d5ff" }
value  = { fg = "#ffffff" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#e9d5ff", bg = "#3d0e75" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#e9d5ff" }
title   = {}
hovered = { fg = "#ffdae0", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#ffffff" }
run    = { fg = "#ffffff" }
footer = { fg = "#342a42", bg = "#e6d8f2" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#ff574c" },
    { name = "*", is = "exec", fg = "#000000" },

    # Fallback
    { url = "*", fg = "#ffffff" },
    { url = "*/", fg = "#d8bbff" },
]

# : ]]]
