format = '''
$directory$git_branch$rust$python
$character'''

palette = 'colors'

[palettes.colors]
mustard = '#af8700' # example
color1 = '{{colors.primary_fixed_dim.default.hex}}'
color2 = '{{colors.on_primary.default.hex}}'
color3 = '{{colors.on_surface_variant.default.hex}}'
color4 = '{{colors.surface_container.default.hex}}'
color5 = '{{colors.on_primary.default.hex}}'
color6 = '{{colors.surface_dim.default.hex}}'
color7 = '{{colors.surface.default.hex}}'
color8 = '{{colors.primary.default.hex}}'
color9 = '{{colors.tertiary.default.hex}}'

# Prompt symbols 
[character]
success_symbol = "[рЯЮИ](color9 bold)"
error_symbol = "[рЯЮИ](@{error})"
vicmd_symbol = "[рЯЮИ](#f9e2af)"

[directory]
format = "[оВґ](fg:color1 bg:color4)[у∞ЙЛ](bg:color1 fg:color2)[оВі ](fg:color1 bg:color4)[$path ](fg:color3 bg:color4)[оВі ](fg:color4)"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
format = "[оВґ](fg:color8 bg:color4)[пЗУ ](bg:color8 fg:color5)[оВі](fg:color8 bg:color4)[(bg:color8 fg:color5) $branch](fg:color3 bg:color4)[оВі](fg:color4) "

[time]
format = "[оВґ](fg:color8 bg:color4)[пРЇ ](bg:color8 fg:color5)[оВі](fg:color8 bg:color4)[(bg:color8 fg:color5) $time](fg:color3 bg:color4)[оВі](fg:color4) "
disabled = false
time_format = "%R" # Hour:Minute Format

[python]
format = "[оВґ](fg:color8 bg:color4)[${symbol}${version}](bg:color8 fg:color5)[оВі](fg:color8 bg:color4)[(bg:color8 fg:color5)( ${virtualenv})](fg:color3 bg:color4)[оВі](fg:color4) "
symbol = 'оИµ '
# pyenv_version_name = true
pyenv_prefix = 'venv'
