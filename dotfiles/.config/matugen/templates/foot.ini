[colors-dark]
foreground={{colors.on_surface.default.hex_stripped}}
background={{colors.background.default.hex_stripped}}
selection-foreground={{colors.on_surface.default.hex_stripped}}
selection-background={{colors.primary_container.default.hex_stripped}}
cursor = {{colors.background.default.hex_stripped}} {{colors.primary.default.hex_stripped}}

regular0={{base16.base08.default.hex_stripped}}
regular1={{base16.base09.default.hex_stripped}}
regular2={{base16.base0a.default.hex_stripped}}
regular3={{base16.base0b.default.hex_stripped}}
regular4={{base16.base0c.default.hex_stripped}}
regular5={{base16.base0d.default.hex_stripped}}
regular6={{base16.base0e.default.hex_stripped}}
regular7={{base16.base0f.default.hex_stripped}}

bright0={{base16.base08.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright1={{base16.base09.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright2={{base16.base0a.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright3={{base16.base0b.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright4={{base16.base0c.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright5={{base16.base0d.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright6={{base16.base0e.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}
bright7={{base16.base0f.default.hex_stripped | auto_lightness: 10 | lighten: 15 | saturate: 30, "hsl" }}

dim-blend-towards=<* if {{ is_dark_mode }} *>black<* else *>white<* endif *>
