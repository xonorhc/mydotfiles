# -----------------------------------------------------
# General Window Decoration
# -----------------------------------------------------

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 2
        ignore_opacity = false
        new_optimizations = on
        xray = false
    }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000050)
    }

}
