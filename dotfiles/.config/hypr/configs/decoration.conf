# -----------------------------------------------------
# General Window Decoration
# https://wiki.hypr.land/Configuring/Variables/#decoration
# -----------------------------------------------------

decoration {
    rounding = 5
    rounding_power = 6.0

    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0.8

    blur {
        enabled = false
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        popups = false
    }

    shadow {
        enabled = false
        range = 35
        render_power = 2
        sharp = false
        ignore_window = true
        scale = 1.0
        color = rgba(00000050)
    }
}
