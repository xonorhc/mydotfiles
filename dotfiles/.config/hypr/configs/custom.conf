env = SUDO_EDITOR,vim
env = EDITOR,nvim
env = VISUAL,nvim
env = NVIM_APPNAME,nvim-astro6
# env = NVIM_APPNAME,nvim-nvchad
env = PATH,$PATH:$HOME/.local/share/bob/nvim-bin

env = BROWSER,app.zen_browser.zen

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
