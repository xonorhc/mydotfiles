# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Load Wallpaper
exec-once = swww restore

# Load Notification Daemon
exec-once = swaync

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Load Waybar
exec-once = waybar

# Uncomment in case you have issues with screensharing
# exec-once = ~/.config/hypr/scripts/xdg.sh

# exec-once = uwsm-app dropbox
exec-once = sleep 15 && systemctl --user start onedrive_tray.service
exec-once = sleep 15 && flatpak run org.qbittorrent.qBittorrent
