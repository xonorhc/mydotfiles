##############################
### WINDOWS AND WORKSPACES ###
##############################

# idleinhibit
windowrule = match:class = ([window]), idle_inhibit = fullscreen # Available modes: none, always, focus, fullscreen
windowrule = idle_inhibit fullscreen true, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# Only add the Core applications here
windowrule {
    name = floating_apps
    tag = +floating_apps
    match:class = ^(blueman-manager|pavucontrol-qt|com\.gabm\.satty|vlc|kvantummanager|qt[56]ct|nwg-(look|displays)|org\.kde\.ark|org\.pulseaudio\.pavucontrol|blueman-manager|nm-(applet|connection-editor)|org\.kde\.polkit-kde-authentication-agent-1|console-dropdown)$
    float = true
    center = true
    size = 700 600
}

# common popups
windowrule {
    name = common_popups
    tag = +common_popups
    match:title = ^(Choose Files|Save As|Confirm to replace files|File Operation Progress|Open|Authentication Required|Add Folder to Workspace|File Upload.*|Choose wallpaper.*|Library.*|.*dialog.*)$
    float = true
    center = true
}

windowrule = match:initial_title ^(Open File|Volume Control|Save As.*)$, tag +common_popups

windowrule {
    name = portal_dialogs
    tag = +portal_dialogs
    match:class = ^(org\.freedesktop\.impl\.portal\.desktop\.(hyprland|gtk)|[Xx]dg-desktop-portal-gtk)$
    float = true
    center = true
}

windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# Float and center file pickers
windowrule {
    name = xdg-desktop-portal-gtk
    match:class = ^(.*dialog.*|[Xx]dg-desktop-portal-gtk)$
    match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)
    float = true
    center = true
    size = 500 400
}

# General floating
windowrule {
    name = dotfiles-floating
    match:class = (dotfiles-floating)
    float = true
    center = true
    size = 1000 700
}

# Gnome Calculator
windowrule {
    name = gnome-calculator
    match:class = (org.gnome.Calculator)
    float = true
    center = true
    size = 700 600
}

# Loupe
windowrule {
    name = loupe
    match:class = (org.gnome.Loupe)
    float = true
    center = true
    size = 1000 800
}
