##############################
### WINDOWS AND WORKSPACES ###
##############################

# Idleinhibit
windowrule = match:class = ([window]), idle_inhibit = fullscreen
windowrule = idle_inhibit fullscreen true, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

windowrule {
     name = idle_media_players
     match:class = ^(vlc|mpv)$
     idle_inhibit = focus
}

windowrule {
     name = idle_youtube
     match:class = ^(firefox)$
     match:title = .*YouTube.*
     idle_inhibit = focus
}

# Only add the Core applications here
windowrule {
    name = floating_apps
    tag = +floating_apps
    match:class = ^(blueman-manager|pavucontrol-qt|com\.gabm\.satty|vlc|kvantummanager|qt[56]ct|nwg-(look|displays)|org\.kde\.ark|org\.pulseaudio\.pavucontrol|blueman-manager|nm-(applet|connection-editor)|org\.kde\.polkit-kde-authentication-agent-1|console-dropdown)$
    float = true
    center = true
    size = 720 480
}

# Common popups
windowrule {
    name = common_popups
    tag = +common_popups
    match:title = ^(Open|Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload|Authentication Required|Add Folder to Workspace|Choose Files|Confirm to replace files|File Operation Progress)(.*)$|^(.*dialog.*)$
    float = true
    center = true
    size = 800 600
}

windowrule {
    name = portal_dialogs
    tag = +portal_dialogs
    match:class = ^(org\.freedesktop\.impl\.portal\.desktop\.(hyprland|gtk)|[Xx]dg-desktop-portal-gtk)$
    float = true
    center = true
}

windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    float = true
    pin = true
    size = 640 480
    move = (monitor_w-window_w-20) (monitor_h-window_h-20)
    no_dim = on
    opaque = on
}

# Float and center file pickers
windowrule {
    name = xdg-desktop-portal-gtk
    match:class = ^(.*dialog.*|[Xx]dg-desktop-portal-gtk)$
    match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)
    float = true
    center = true
    size = 640 480
}

# Fuzzel rule
layerrule {
    name = blur-launcher
    match:namespace = launcher
    blur = on
    dim_around = on
    ignore_alpha = 0.2
}

# Swaync rule
layerrule {
    name = swaync_slide
    match:namespace = swaync-control-center
    animation = slide left
    dim_around = on
    blur = on
    ignore_alpha = 0.2
}

layerrule {
    name = swaync_notifications
    match:namespace = swaync-notification-window
    blur = on
    ignore_alpha = 0.2
}

# Special Workspaces
workspace = special:magic, gapsout:20, gapsin:6
windowrule {
    name = style-magic-workspace
    match:workspace = special:magic
    border_color = $primary
    border_size = 2
}

#--- 1. Behavior for Single Tiled Window (w[tv1]) ---
# A. Workspace Rule: Remove gaps when only 1 tiled window is visible
workspace = w[tv1], gapsout:0, gapsin:0
# B. Window Rule: Remove border & rounding for windows on that workspace
windowrule {
  name = smart-gaps-single
  match:workspace = w[tv1]
  match:float = off
  border_size = 0
  rounding = 0
}

# --- 2. Behavior for Maximized Layout State (f[1]) ---
# A. Workspace Rule: Remove gaps when workspace is maximized
workspace = f[1], gapsout:0, gapsin:0
# B. Window Rule: Remove border & rounding for windows on maximized workspace
windowrule {
  name = smart-gaps-maximized
  match:workspace = f[1]
  match:float = off
  border_size = 0
  rounding = 0
}

# Kitty floating
windowrule {
    name = kitty-floating
    match:class = ^(kitty-floating)$
    match:title = ^(kitty)$
    float = on
    size = 1024 768
    center = on
}

# Btop
windowrule {
    name = btop
    match:class = ^(btop-monitor)$
    float = true
    center = true
    size = 1600 900
}

# Gnome Calculator
windowrule {
    name = gnome-calculator
    match:class = (org.gnome.Calculator)
    float = true
    center = true
    size = 640 480
}

# Loupe
windowrule {
    name = loupe
    match:class = (org.gnome.Loupe)
    float = true
    center = true
    size = 1024 768
}
