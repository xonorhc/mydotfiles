###################
### KEYBINDINGS ###
###################

# SUPER KEY
$mainMod = SUPER

# PROG PARAMS
$run = uwsm app --
$scripts = ~/.config/hypr/scripts
$terminal = kitty
$browser = flatpak run app.zen_browser.zen

# Standard Apps
bind = $mainMod, RETURN, exec, $run $terminal
bind = $mainMod, E, exec, $run $terminal -e yazi
bind = $mainMod, N, exec, $run $terminal -e nvim
bind = $mainMod SHIFT, N, exec, $run $terminal -e jrnl study
bind = $mainMod SHIFT, D, exec, $run $terminal -e nb shell
bind = $mainMod, W, exec, $run $browser
bind = $mainMod SHIFT, W, exec, $run $browser --private-window
bind = $mainMod SHIFT, E, exec, $run thunar

# Floating Apps
$terminalFloat = $run $terminal --class kitty-floating
bind = $mainMod SHIFT, RETURN, exec, $terminalFloat
bind = $mainMod ALT, D, exec, $terminalFloat -e $scripts/nb_daily
bind = $mainMod ALT, N, exec, $terminalFloat -e jrnl --config-override editor 'nvim -c "startinsert"'
bind = $mainMod, D, exec, $terminalFloat -e lazydocker
bind = $mainMod SHIFT, P, exec, $terminalFloat -e lazysql
bind = $mainMod, SLASH, exec, [float; center; size 1080 800] $passwordManager

# Control scratchpad
bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = $mainMod ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
bind = CTRL SHIFT, ESCAPE, togglespecialworkspace, btop

# Tools & Menus
bind = $mainMod, A, exec, pkill fuzzel || $run fuzzel
bind = $mainMod, V, exec, cliphist list | $run fuzzel --dmenu --with-nth 2 | cliphist decode | $run wl-copy
bind = $mainMod CTRL, Q, exec, $run $scripts/fuzzel-powermenu
bind = $mainMod SHIFT, T, exec, $run $scripts/fuzzel-colorselector
bind = $mainMod CTRL, T, exec, $run $scripts/fuzzel-themeselector
bind = $mainMod ALT, T, exec, $run $scripts/fuzzel-translate
bind = $mainMod, comma, exec, $run $scripts/fuzzel-emojipicker
bind = $mainMod ALT, W, exec, $run $scripts/fuzzel-websearch

# Extra Actions
bind = $mainMod SHIFT, Escape, exec, uwsm stop
bind = $mainMod SHIFT, R, exec, systemctl --user restart 'app-*.service' && hyprctl reload
bind = $mainMod SHIFT, B, exec, $run ~/.config/waybar/launch
bind = ALT_R, Control_R, exec, killall -SIGUSR1 waybar

# Capture Screen (Screenshots)
# bind = $mainMod, C, exec, grim -g "$(slurp -d)" - | wl-copy
bind = $mainMod, C, exec, grimblast save active
bind = $mainMod SHIFT, C, exec, grimblast save area
bind = $mainMod ALT, C, exec, grimblast save output
bind = $mainMod CTRL, C, exec, grimblast save screen

# Windows & Layout
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow -j | jq '.pid' | xargs kill -9
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, togglefloating,
bind = $mainMod, P, pin,
bind = $mainMod SHIFT, K, layoutmsg, swapsplit
bind = $mainMod SHIFT, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, H, exec, $scripts/minimize

# Group
bind = $mainMod, G, togglegroup
bind = $mainMod ALT, G, moveoutofgroup
bind = $mainMod ALT, Tab, changegroupactive, f

# Submaps (Resize / Move)
bind = ALT, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , K, resizeactive, 0 -10
binde = , J, resizeactive, 0 10
binde = , L, resizeactive, 10 0
bind = , escape, submap, reset
submap = reset

bind = ALT, M, submap, move
submap = move
binde = , H, moveactive, -20 0
binde = , K, moveactive, 0 -20
binde = , J, moveactive, 0 20
binde = , L, moveactive, 20 0
bind = , escape, submap, reset
submap = reset

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Window focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

bind = $mainMod SHIFT, LEFT, swapwindow, l
bind = $mainMod SHIFT, RIGHT, swapwindow, r
bind = $mainMod SHIFT, UP, swapwindow, u
bind = $mainMod SHIFT, DOWN, swapwindow, d

bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev
bind = ALT, TAB, bringactivetotop
bind = ALT SHIFT, TAB, bringactivetotop

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Tab, workspace, m+1
bind = $mainMod SHIFT, Tab, workspace, m-1
bind = $mainMod CTRL, down, workspace, empty

# Hardware & Multimedia
bind = , XF86MonBrightnessUp, exec, $run brightnessctl -q s +10%
bind = , XF86MonBrightnessDown, exec, $run brightnessctl -q s 10%-
bind = , code:238, exec, $run brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, $run brightnessctl -d smc::kbd_backlight s 10-

bindle=, XF86AudioRaiseVolume, exec, $run wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindle=, XF86AudioLowerVolume, exec, $run wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, $run wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, $run wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = , XF86AudioPlay, exec, $run playerctl play-pause
bind = , XF86AudioPause, exec, $run playerctl pause
bind = , XF86AudioNext, exec, $run playerctl next
bind = , XF86AudioPrev, exec, $run playerctl previous
bind = CTRL, RETURN, exec, $run playerctl play-pause

bind = , XF86Lock, exec, $run hyprlock

# Zoom
bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

