# -----------------------------------------------------
# Hyprland Key Bindings
# See https://wiki.hypr.land/Configuring/Binds/ for more
# -----------------------------------------------------

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Set programs
$run = uwsm app --
$scripts = ~/.config/hypr/scripts
$terminal = foot
$browser = flatpak run app.zen_browser.zen
$rofiConfig = ~/.config/rofi

# --- Default apps ---
bind = $mainMod, RETURN, exec, $run $terminal
bind = $mainMod, E, exec, $run $terminal -e yazi
bind = $mainMod, N, exec, $run $terminal -e nvim
bind = $mainMod SHIFT, N, exec, $run $terminal -e jrnl study
bind = $mainMod SHIFT, D, exec, $run $terminal -e nb shell
bind = $mainMod, W, exec, $run $browser
bind = $mainMod SHIFT, W, exec, $run $browser --private-window
bind = $mainMod SHIFT, E, exec, $run thunar

# --- Float apps ---
$terminalFloat = [float; size 1024 768; center] $run $terminal 
bind = $mainMod SHIFT, RETURN, exec, $terminalFloat
bind = $mainMod ALT, D, exec, $terminalFloat -e $scripts/nb_daily
bind = $mainMod ALT, N, exec, $terminalFloat -e jrnl --config-override editor 'nvim -c "startinsert"'
bind = $mainMod, D, exec, $terminalFloat -e lazydocker
bind = $mainMod SHIFT, P, exec, $terminalFloat -e lazysql
bind = $mainMod, SLASH, exec, [float; center; size 1080 800] $passwordManager

# --- Special workspace (scratchpad) ---
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:scratchpad

bind = $mainMod SHIFT, H, exec, $scripts/minimize
bind = CTRL SHIFT, ESCAPE, togglespecialworkspace, btop

# --- Focus & Window ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, LEFT, movefocus, l
bind = $mainMod, RIGHT, movefocus, r
bind = $mainMod, UP, movefocus, u
bind = $mainMod, DOWN, movefocus, d

bind = $mainMod SHIFT, LEFT, swapwindow, l
bind = $mainMod SHIFT, RIGHT, swapwindow, r
bind = $mainMod SHIFT, UP, swapwindow, u
bind = $mainMod SHIFT, DOWN, swapwindow, d

# --- Window actions ---
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow -j | jq '.pid' | xargs kill -9
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, togglefloating,
bind = $mainMod, P, pin,
bind = $mainMod SHIFT, K, layoutmsg, swapsplit
bind = $mainMod SHIFT, K, layoutmsg, swapwithmaster master
bind = $mainMod SHIFT, J, layoutmsg, togglesplit

# --- Group ---
bind = $mainMod, G, togglegroup
bind = $mainMod ALT, G, moveoutofgroup
bind = $mainMod ALT, Tab, changegroupactive, f

# --- Cycle apps ---
bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev
bind = ALT, TAB, bringactivetotop
bind = ALT SHIFT, TAB, bringactivetotop

# --- Menus & Tools ---
bind = $mainMod, A, exec, pkill rofi || $run rofi -show drun -modi drun,filebrowser,run,window
bind = SHIFT, Tab, exec, $run rofi -show window -replace -config $rofiConfig/config-compact.rasi
bind = $mainMod, V, exec, $run cliphist list | $run rofi -dmenu -display-columns 2 -replace -config $rofiConfig/config-cliphist.rasi | $run cliphist decode | $run wl-copy
bind = $mainMod ALT, W, exec, $run $scripts/rofi-websearch
bind = $mainMod ALT, T, exec, $run $scripts/rofi-translator
bind = $mainMod SHIFT, T, exec, $run $scripts/rofi-colorselector
bind = $mainMod CTRL, T, exec, $run $scripts/rofi-themeselector

# --- Screenshots ---
$screenshot = $run $scripts/hyprshot -o 'Pictures/screenshots'
bind = $mainMod, C, exec, $screenshot -m active -m window
bind = $mainMod ALT, C, exec, $screenshot -m active -m output
bind = $mainMod SHIFT, C, exec, $screenshot -m region

# --- System & Power ---
bind = $mainMod SHIFT, Escape, exec, uwsm stop
bind = $mainMod SHIFT, R, exec, systemctl --user restart 'app-*.service' && hyprctl reload
bind = $mainMod SHIFT, B, exec, $run ~/.config/waybar/launch
bind = ALT_R, Control_R, exec, killall -SIGUSR1 waybar
bind = $mainMod CTRL, Q, exec, $run $scripts/power-menu
bind = $mainMod CTRL, L, exec, $run $scripts/power lock
bind = CTRL ALT, P, exec, $run hyprpicker -a
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = $mainMod, F1, exec, $scripts/gamemode

# --- Workspaces ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER, TAB, workspace, m+1
bind = SUPER SHIFT, TAB, workspace, e-1
bind = SUPER CTRL, TAB, workspace, previous
bind = $mainMod CTRL, J, workspace, empty

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bind = CTRL, RETURN, exec, $run playerctl play-pause

bind = , XF86Lock, exec, $run hyprlock

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Zoom ---
bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

# --- Submaps (Resize / Move / VM Passthrough) ---
bind = ALT, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , K, resizeactive, 0 -10
binde = , J, resizeactive, 0 10
binde = , L, resizeactive, 10 0
bind = , escape, submap, reset
submap = reset

bind = ALT, M, submap, move
submap = move
binde = , H, moveactive, -20 0
binde = , K, moveactive, 0 -20
binde = , J, moveactive, 0 20
binde = , L, moveactive, 20 0
bind = , escape, submap, reset
submap = reset

bind = CTRL,SPACE,submap,passthru
submap = passthru
bind = SUPER,Escape,submap,reset
submap = reset
