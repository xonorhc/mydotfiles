# -----------------------------------------------------
# Hyprland Key Bindings
# -----------------------------------------------------

# SUPER KEY
$mainMod = SUPER

# PROG PARAMS
$run = uwsm app --
$scripts = ~/.config/hypr/scripts
$terminal = kitty
$browser = flatpak run app.zen_browser.zen
$rofiConfig = ~/.config/rofi

# Standard Apps
bind = $mainMod, RETURN, exec, $run $terminal
bind = $mainMod, E, exec, $run $terminal -e yazi
bind = $mainMod, N, exec, $run $terminal -e nvim
bind = $mainMod SHIFT, N, exec, $run $terminal -e jrnl study
bind = $mainMod SHIFT, D, exec, $run $terminal -e nb shell
bind = $mainMod, W, exec, $run $browser
bind = $mainMod SHIFT, W, exec, $run $browser --private-window
bind = $mainMod SHIFT, E, exec, $run thunar

# Floating Apps
$terminalFloat = [float; size (monitor_w/2) (monitor_h/1.5)] $run $terminal --class kitty-floating
bind = $mainMod SHIFT, RETURN, exec, $terminalFloat
bind = $mainMod ALT, D, exec, $terminalFloat -e $scripts/nb_daily
bind = $mainMod ALT, N, exec, $terminalFloat -e jrnl --config-override editor 'nvim -c "startinsert"'

bindd = $mainMod, D, LazyDocker, exec, $terminalFloat -e lazydocker
bindd = $mainMod SHIFT, P, LazySQL, exec, $terminalFloat -e lazysql
bindd = $mainMod, SLASH, Password manager, exec, [float; size (monitor_w/2) (monitor_h/1.5)] $passwordManager

# --- SCRATCHPAD (btop) ---
bind = CTRL SHIFT, ESCAPE, togglespecialworkspace, btop

# -----------------------------------------------------
# Windows & Layout
# -----------------------------------------------------

# Focus & Swap
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move focus with SUPER + arrow keys
bindd = $mainMod, LEFT, Move focus left, movefocus, l
bindd = $mainMod, RIGHT, Move focus right, movefocus, r
bindd = $mainMod, UP, Move focus up, movefocus, u
bindd = $mainMod, DOWN, Move focus down, movefocus, d

# Close windows
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow -j | jq '.pid' | xargs kill -9

# Control tiling
bindd = $mainMod, F, Full screen, fullscreen, 0
bindd = $mainMod, M, Full width, fullscreen, 1
bindd = $mainMod, T, Toggle window floating/tiling, togglefloating,
bind = $mainMod SHIFT, K, layoutmsg, swapsplit
bindd = $mainMod SHIFT, J, Toggle window split, layoutmsg, togglesplit

# Pins a window
bind = $mainMod, P, togglefloating,
bind = $mainMod, P, pin,
bindd = $mainMod CTRL, P, Pop window out (float & pin), exec, [float; pin; move (window_w*1.20) (window_h*1.25); size (monitor_w*0.4) (monitor_h*0.4)] kitty

# Group
bindd = $mainMod, G, toggle group, togglegroup
bindd = $mainMod ALT, G, Move active out of group, moveoutofgroup
bindd = $mainMod ALT, Tab, Change Group Forward, changegroupactive, f

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = $mainMod, mouse:272, Move window, movewindow
bindmd = $mainMod, mouse:273, Resize window, resizewindow

# Resize window (keyboard)
bind = ALT, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , K, resizeactive, 0 -10
binde = , J, resizeactive, 0 10
binde = , L, resizeactive, 10 0
bind = , escape, submap, reset
submap = reset

# Move window (keyboard)
bind = ALT, M, submap, move
submap = move
binde = , H, moveactive, -20 0
binde = , K, moveactive, 0 -20
binde = , J, moveactive, 0 20
binde = , L, moveactive, 20 0
bind = , escape, submap, reset
submap = reset

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = $mainMod SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = $mainMod SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = $mainMod SHIFT, UP, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, DOWN, Swap window down, swapwindow, d

# Cycle through applications on active workspace
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Special workspace
bindd = $mainMod SHIFT, S, move to special workspace, movetoworkspace, special
bindd = $mainMod, S, toggle special workspace, togglespecialworkspace,

# Minimize windows
bind = $mainMod SHIFT, H, exec, $scripts/minimize

# -----------------------------------------------------
# Tools & Menus (Rofi, Screenshots, etc)
# -----------------------------------------------------

# Rofi Launcher (Com o Toggle que você criou)
bindd = $mainMod, A, app launcher, exec, pkill rofi || $run rofi -show drun -modi drun,filebrowser,run,window
bind = SHIFT, Tab, exec, $run rofi -show window -replace -config $rofiConfig/config-compact.rasi
bind = $mainMod, V, exec, $run cliphist list | $run rofi -dmenu -display-columns 2 -replace -config $rofiConfig/config-cliphist.rasi | $run cliphist decode | $run wl-copy
bind = $mainMod ALT, W, exec, $run $scripts/rofi-websearch
bind = $mainMod ALT, T, exec, $run $scripts/rofi-translator
bind = $mainMod SHIFT, T, exec, $run $scripts/rofi-themeselector

# Screenshots
$screenshot = $run $scripts/hyprshot -o 'Pictures/screenshots'
bind = $mainMod, C, exec, $screenshot -m active -m window
bind = $mainMod ALT, C, exec, $screenshot -m active -m output
bind = $mainMod SHIFT, C, exec, $screenshot -m region

# Extra Actions
bind = $mainMod SHIFT, Escape, exec, uwsm stop
bind = $mainMod SHIFT, R, exec, systemctl --user restart 'app-*.service' && hyprctl reload
bind = $mainMod SHIFT, B, exec, $run ~/.config/waybar/launch
bind = ALT_R, Control_R, exec, killall -SIGUSR1 waybar
bind = $mainMod CTRL, Q, exec, $run $scripts/power-menu
bind = $mainMod CTRL, L, exec, $run $scripts/power lock
bind = CTRL ALT, P, exec, $run hyprpicker -a
bindd = CTRL ALT, Delete, exit Hyprland, exec, hyprctl dispatch exit 0

# Toggle animations/blur/etc hotkey
bind = $mainMod, F1, exec, $scripts/gamemode

# -----------------------------------------------------
# Workspaces
# -----------------------------------------------------

# Switch workspaces with SUPER + [0-9]
bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bindd = SUPER SHIFT, code:10, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, code:11, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, code:12, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, code:13, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, code:14, Move window to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, code:15, Move window to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, code:16, Move window to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, code:17, Move window to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, code:18, Move window to workspace 9, movetoworkspace, 9
bindd = SUPER SHIFT, code:19, Move window to workspace 10, movetoworkspace, 10

# TAB between workspaces
bindd = SUPER, TAB, Next workspace, workspace, m+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous
bind = $mainMod CTRL, down, workspace, empty

# -----------------------------------------------------
# Hardware & Multimedia
# -----------------------------------------------------

# Brilho
bind = , XF86MonBrightnessUp, exec, $run brightnessctl -q s +10%
bind = , XF86MonBrightnessDown, exec, $run brightnessctl -q s 10%-
bind = , code:238, exec, $run brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, $run brightnessctl -d smc::kbd_backlight s 10-

# Audio (Usando wpctl com limite de segurança)
bindle=, XF86AudioRaiseVolume, exec, $run wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindle=, XF86AudioLowerVolume, exec, $run wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, $run wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute, exec, $run wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media Control
bind = , XF86AudioPlay, exec, $run playerctl play-pause
bind = , XF86AudioPause, exec, $run playerctl pause
bind = , XF86AudioNext, exec, $run playerctl next
bind = , XF86AudioPrev, exec, $run playerctl previous
bind = CTRL, RETURN, exec, $run playerctl play-pause

# Lock Screen
bind = , XF86Lock, exec, $run hyprlock

# -----------------------------------------------------
# Zoom
# -----------------------------------------------------

bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')
binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.1')
binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.9) | if . < 1 then 1 else . end')

bind = $mainMod SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = $mainMod SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

# -----------------------------------------------------
# VM
# -----------------------------------------------------

bind = CTRL,SPACE,submap,passthru
submap = passthru
bind = SUPER,Escape,submap,reset
submap = reset
