# -----------------------------------------------------
# Window Layout and Colors
# Refer to https://wiki.hypr.land/Configuring/Variables/
# -----------------------------------------------------

general {
    gaps_in = 5
    gaps_out = 10
    gaps_workspaces = 0
    border_size = 2

    col.active_border = $primary rgba(00000020) 90deg
    col.inactive_border = rgba(00000000)

    resize_on_border = false
    allow_tearing = true
    layout = dwindle

    snap {
        enabled = false
    }
}
