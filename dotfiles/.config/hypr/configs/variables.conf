#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    gaps_workspaces = 0
    border_size = 2

    col.active_border = $source_color rgba(00000010) 90deg
    col.inactive_border = rgba(00000010)

    resize_on_border = false
    allow_tearing = true
    layout = dwindle

    snap {
        enabled = false
    }
}

decoration {
    rounding = 15
    rounding_power = 6.0

    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0.8

    blur {
        enabled = false
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
        popups = false
    }

    shadow {
        enabled = false
        range = 35
        render_power = 2
        sharp = false
        ignore_window = true
        scale = 1.0
        color = rgba(00000050)
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    allow_session_lock_restore = true
    background_color = $background

    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
    always_follow_on_dnd = true

    vfr = true
    vrr = 0

    on_focus_under_fullscreen = 1
    initial_workspace_tracking = 0
    focus_on_activate = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us, br
    kb_variant = , abnt2
    kb_options = grp:win_space_toggle

    resolve_binds_by_sym = false
    numlock_by_default = true
    repeat_rate = 50
    repeat_delay = 250

    follow_mouse = 1
    sensitivity = 1
    accel_profile = adaptive
    force_no_accel = false
    left_handed = false
    mouse_refocus = false

    scroll_method = 2fg

    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
        clickfinger_behavior = true
        drag_lock = false
    }
}

############################
### USEFUL OPTIMIZATIONS ###
############################

xwayland {
    force_zero_scaling = true
}
