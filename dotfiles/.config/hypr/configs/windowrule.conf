# -----------------------------------------------------
# Window Rules
# -----------------------------------------------------

# idleinhibit
windowrule = match:class = ([window]), idle_inhibit = fullscreen
windowrule = idle_inhibit fullscreen true, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# Only add the Core applications here
windowrule {
    name = floating_apps
    tag = +floating_apps
    match:class = ^(blueman-manager|pavucontrol-qt|com\.gabm\.satty|vlc|kvantummanager|qt[56]ct|nwg-(look|displays)|org\.kde\.ark|org\.pulseaudio\.pavucontrol|blueman-manager|nm-(applet|connection-editor)|org\.gnome\.polkit-gnome-authentication-agent-1|console-dropdown)$
    float = true
    center = true
    size = 700 600
}

# common popups
windowrule {
    name = common_popups
    tag = +common_popups
    match:title = ^(Choose Files|Save As|Confirm to replace files|File Operation Progress|Open|Authentication Required|Add Folder to Workspace|File Upload.*|Choose wallpaper.*|Library.*|.*dialog.*)$
    float = true
    center = true
}

windowrule = match:initial_title ^(Open File|Volume Control|Save As.*)$, tag +common_popups

windowrule {
    name = portal_dialogs
    tag = +portal_dialogs
    match:class = ^(org\.freedesktop\.impl\.portal\.desktop\.(hyprland|gtk)|[Xx]dg-desktop-portal-gtk)$
    float = true
    center = true
}

windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

# Float and center file pickers
windowrule {
    name = xdg-desktop-portal-gtk
    match:class = ^(.*dialog.*|[Xx]dg-desktop-portal-gtk)$
    match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)
    float = true
    center = true
    size = 500 400
}

# Newelle
windowrule {
    name = newelle
    match:class = (io.github.qwersyk.Newelle)
    float = true
    center = true
    pin = true
    size = 1000 700
}

# System Mission Center
windowrule {
    name = missioncenter
    match:class = (io.missioncenter.MissionCenter)
    float = true
    center = true
    pin = true
    size = 1000 700
}

# Gnome Calculator
windowrule {
    name = gnome-calculator
    match:class = (org.gnome.Calculator)
    float = true
    center = true
    size = 700 600
}

# Hyprland Share Picker
windowrule {
    name = hyprland-share-picker
    match:class = (hyprland-share-picker)
    float = true
    pin = true
    center = true
    size = 600 400
}

# Haruna
windowrule {
    name = haruna
    match:class = (org.kde.haruna)
    float = true
    center = true
    size = 1500 900
}

# Loupe
windowrule {
    name = loupe
    match:class = (org.gnome.Loupe)
    float = true
    center = true
    size = 1000 800
}

# Upscaler
windowrule {
    name = upscaler
    match:class = (io.gitlab.theevilskeleton.Upscaler)
    float = true
    center = true
    pin = true
    size = 600 900
}

# Impression
windowrule {
    name = impression
    match:class = (io.gitlab.adhami3310.Impression)
    float = true
    center = true
    pin = true
    size = 600 900
}

# Proton Pass
windowrule {
    name = proton-pass
    match:class = (me.proton.Pass)
    float = true
    center = true
    size = 700 600
}

# Proton VPN
windowrule {
    name = proton-vpn
    match:class = (com.protonvpn.www)
    float = true
    pin = true
    size = 400 900
}


# -----------------------------------------------------
# Layer Rules
# -----------------------------------------------------

layerrule {
    name = layer_blur
    match:namespace = ^(notifications|waybar|logout_dialog)$
    blur = true
}

layerrule {
    name = layer_ignore_alpha
    match:namespace = ^(notifications|logout_dialog|waybar|selection)$
    ignore_alpha = true
}

layerrule {
  name = no_anim_for_selection
  no_anim = on
  match:namespace = (selection|hyprpicker)
}
