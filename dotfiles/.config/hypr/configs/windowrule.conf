# -----------------------------------------------------
# Window Rules
# -----------------------------------------------------

# idleinhibit
windowrule = match:class = ([window]), idle_inhibit = fullscreen # Available modes: none, always, focus, fullscreen

# SwayNC
layerrule2 = blur, swaync-control-center
layerrule2 = blur, swaync-notification-window
layerrule2 = ignorezero, swaync-control-center
layerrule2 = ignorezero, swaync-notification-window
layerrule2 = ignorealpha 0.5, swaync-control-center
layerrule2 = ignorealpha 0.5, swaync-notification-window

# Pavucontrol
windowrule {
    name = pavucontrol
    match:class = (.*org.pulseaudio.pavucontrol.*)
    float = true
    center = true
    pin = true
    size = 700 600
}

# Waypaper
windowrule {
    name = waypaper
    match:class = (.*waypaper.*)
    float = true
    center = true
    pin = true
    size = 900 700
}

# Newelle
windowrule {
    name = newelle
    match:class = (io.github.qwersyk.Newelle)
    float = true
    center = true
    pin = true
    size = 1000 700
}

# Blueman Manager
windowrule {
    name = blueman-manager
    match:class = (blueman-manager)
    float = true
    center = true
    size = 800 600
}

# nwg-look
windowrule {
    name = nwg-look
    match:class = (nwg-look)
    float = true
    center = true
    size = 700 600
}

# nwg-displays
windowrule {
    name = nwg-displays
    match:class = (nwg-displays)
    float = true
    center = true
    size = 900 600
}

# System Mission Center
windowrule {
    name = missioncenter
    match:class = (io.missioncenter.MissionCenter)
    float = true
    center = true
    pin = true
    size = 900 600
}

# Gnome Calculator
windowrule {
    name = gnome-calculator
    match:class = (org.gnome.Calculator)
    float = true
    center = true
    size = 700 600
}

# Hyprland Share Picker
windowrule {
    name = hyprland-share-picker
    match:class = (hyprland-share-picker)
    float = true
    pin = true
    center = true
    size = 600 400
}

# nm-connection-editor
windowrule {
    name = nm-connection-editor
    match:class = (nm-connection-editor)
    float = true
    center = true
    size = 800 700
}

# Picture-in-Picture
windowrule {
    name = Picture-in-Picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    pin = true
    center = true
}

# General floating
windowrule {
    name = dotfiles-floating
    match:class = (dotfiles-floating)
    float = true
    center = true
    size = 1000 700
}

# Haruna
windowrule {
    name = haruna
    match:class = (org.kde.haruna)
    float = true
    center = true
    size = 1500 900
}

# Loupe
windowrule {
    name = loupe
    match:class = (org.gnome.Loupe)
    float = true
    center = true
    size = 1000 800
}

# Upscaler
windowrule {
    name = upscaler
    match:class = (io.gitlab.theevilskeleton.Upscaler)
    float = true
    center = true
    pin = true
    size = 600 900
}

# Impression
windowrule {
    name = impression
    match:class = (io.gitlab.adhami3310.Impression)
    float = true
    center = true
    pin = true
    size = 600 900
}

# Proton Pass
windowrule {
    name = proton-pass
    match:class = (me.proton.Pass)
    float = true
    center = true
    size = 700 600
}

# Proton VPN
windowrule {
    name = proton-vpn
    match:class = (com.protonvpn.www)
    float = true
    pin = true
    size = 400 900
}

# Float and center file pickers
windowrule {
    name = xdg-desktop-portal-gtk
    match:class = (xdg-desktop-portal-gtk)
    match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)
    float = true
    center = true
    size = 500 400
}
