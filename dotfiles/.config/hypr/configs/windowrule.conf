# -----------------------------------------------------
# Window Rules
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# -----------------------------------------------------

# -----------------------------------------------------------------------------
# GENERAL / XWAYLAND / GLOBAL SETTINGS
# -----------------------------------------------------------------------------
xwayland {
    force_zero_scaling = true
}

# -----------------------------------------------------
# IDLE INHIBIT (Media Consumption)
# -----------------------------------------------------
windowrule = match:class = ([window]), idle_inhibit = fullscreen
windowrule = idle_inhibit fullscreen true, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

windowrule {
   name = idle_media_players
   match:class = ^(vlc|mpv)$
   idle_inhibit = focus
}

windowrule {
   name = idle_youtube
   match:class = ^(firefox)$
   match:title = .*YouTube.*
   idle_inhibit = focus
}

# -----------------------------------------------------------------------------
# APPLICATION-SPECIFIC FLOATS & VISUALS (Browsers, media, etc.)
# -----------------------------------------------------------------------------
#--- MPV: Always Float & Small ---
windowrule {
    name = float-mpv
    match:class = ^(mpv)$
    float = on
    opaque = on
    size = 640 360
    center = on
}

# -----------------------------------------------------------------------------
# COMMON DESKTOP / GNOME / QT UTILITIES (calculator, viewers, managers)
# -----------------------------------------------------------------------------
#--- Calculator ---
windowrule {
    name = float-calculator
    match:class = ^(org.gnome.Calculator)$
    float = on
    size = 360 616  # Compact vertical layout
    center = on
}

#--- Loupe (Image Viewer) ---
windowrule {
    name = float-loupe
    match:class = ^(org.gnome.Loupe)$
    float = on
    size = 1024 768
    center = on
    opaque = on
}

#--- Gparted ---
windowrule {
    name = gparted
    match:class = ^(GParted)$
    float = on
    size = 652 431
    center = on
}

#--- Blueman Manager ---
windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = on
    size = 530 313 # Medium size for device lists
    center = on
}

#--- Peaclock-tui-time ---
windowrule {
    name = peaclock
    match:class = ^(peaclock)$
    float = on
    center = on
    size = 406 179
}

# --- Cava Music visvualiser ---
windowrule {
    name = cava
    match:class = ^(cava)$
    float = on
    size = 791 488
    center = on
}

#--- Gnome-disks ---
windowrule {
    name = disks
    match:title = ^(Disks)$
    match:class = ^(org.gnome.DiskUtility)$
    float = on
    size = 890 512
    center = on
}

#--- Zathura (PDF Viewer) ---
windowrule {
    name = float-zathura
    match:class = ^(org.pwmt.zathura)$
    float = on
    size = 655 526 # Portrait ratio for reading documents
    center = on
}

#--- Hyprland Share Picker ---
windowrule {
    name = float-share-picker
    match:class = ^(hyprland-share-picker)$
    float = on
    size = 500 300  # Small dialog box
    center = on
}

#--- NWG Look (GTK Theming) ---
windowrule {
    name = float-nwg-look
    match:class = ^(nwg-look)$
    float = on
    size = 627 464  # Standard window size for settings
    center = on
}

#--- Qt6 Configuration Tool ---
windowrule {
    name = float-qt6ct
    match:class = ^(qt6ct)$
    float = on
    size = 700 609
    center = on
}

#--- Qt5 Configuration Tool ---
windowrule {
    name = float-qt5ct
    match:class = ^(qt5ct)$
    float = on
    size = 636 665
    center = on
}

#--- Pavucontrol (Volume Control) ---
windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$
    float = on
    size = 643 422
    center = on
}

#--- Network Connection Editor ---
windowrule {
    name = float-nm-editor
    match:class = ^(nm-connection-editor)$
    float = on
    size = 432 423
    center = on
}

#--- Virt-Manager vm window ---
windowrule {
    name = float_vm_viewer
    match:class = ^(virt-manager)$
    match:title = ^(.* on QEMU/KVM)$
    float = on
    center = on
    size = 1043 634
}

# -----------------------------------------------------------------------------
# PICTURE-IN-PICTURE (PiP) & PINNED WINDOWS
# -----------------------------------------------------------------------------
windowrule {
    name = pip-global
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = on
    pin = on
    size = 248 140
    move = (monitor_w-window_w-20) (monitor_h-window_h-20)
    no_dim = on
    opaque = on
}

windowrule {
    name = style-pinned-windows
    match:pin = on
    no_dim = on
    border_color = rgb(328E6E)
    border_size = 2
    animation = slide down
}

# -----------------------------------------------------------------------------
# GLOBAL WINDOW BEHAVIORS
# -----------------------------------------------------------------------------
windowrule {
    name = global-persistent-size
    match:float = on
    persistent_size = on
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# -----------------------------------------------------------------------------
# FULLSCREEN & VISUAL STYLING
# -----------------------------------------------------------------------------
windowrule {
    name = style-fullscreen
    match:fullscreen = on
    border_color = $error
    border_size = 2
    rounding = 0
}

# -----------------------------------------------------------------------------
# COMMON DIALOGS / FILE PICKERS
# -----------------------------------------------------------------------------
windowrule {
    name = float-dialogs-title
    match:title = ^(Open|Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library|File Upload|Authentication Required|Add Folder to Workspace|Choose Files|Confirm to replace files|File Operation Progress)(.*)$|^(.*dialog.*)$
    float = on
    center = on
    size = 816 537
}

windowrule {
    name = float-dialogs-class
    match:class = ^(org.gnome.FileRoller|[Xx]dg-desktop-portal-gtk|.*dialog.*)$
    float = on
    center = on
    size = 816 537

}

# -----------------------------------------------------------------------------
# Layer Rules like rofi, swaync , awww, wlogout (check using `hyprctl layers`)
# -----------------------------------------------------------------------------
#swaync rule
layerrule {
    name = swaync_slide
    match:namespace = swaync-control-center
    animation = slide left
    dim_around = on
    blur = on
    ignore_alpha = 0.2
}

layerrule {
    name = swaync_notifications
    match:namespace = swaync-notification-window
    blur = on
    ignore_alpha = 0.2
}

#rofi rule
layerrule {
    name = blur-rofi
    match:namespace = rofi
    blur = on
    dim_around = on
    ignore_alpha = 0.2
}

#wlogout
layerrule {
    name = logout_dialog_style
    match:namespace = logout_dialog
    blur = on
    ignore_alpha = 0.0
}

# selection for screenshot
layerrule {
    name = selection_white menu
    match:namespace = selection
    blur = off
    no_anim = on
}

#waybar
layerrule {
    name = waybar_blur
    match:namespace = waybar
    blur = true
    xray = true
    ignore_alpha = 0.2
}

# -----------------------------------------------------------------------------
# SPECIAL WORKSPACES
# -----------------------------------------------------------------------------
workspace = special:magic, gapsout:20, gapsin:6
windowrule {
    name = style-magic-workspace
    match:workspace = special:magic
    border_color = $primary
    border_size = 1
}

# -----------------------------------------------------------------------------
# MISCELLANEOUS / STARTUP & EXAMPLES
# -----------------------------------------------------------------------------
# kitty-floating
windowrule {
  name = kitty-floating
  match:class = ^(kitty-floating)$
  match:title = ^(kitty)$
  float = on
  size = 1024 768
  center = on
}

# btop
windowrule {
    name = btop
    match:class = ^(btop-monitor)$
    float = true
    center = true
    size = 1600 900
}

# Newelle
windowrule {
    name = newelle
    match:class = (io.github.qwersyk.Newelle)
    float = true
    center = true
    pin = true
    size = 1440 900
}

# System Mission Center
windowrule {
    name = missioncenter
    match:class = (io.missioncenter.MissionCenter)
    float = true
    center = true
    pin = true
    size = 1280 720
}

# Haruna
windowrule {
    name = haruna
    match:class = (org.kde.haruna)
    float = true
    center = true
    size = 1600 900
}

# Upscaler
windowrule {
    name = upscaler
    match:class = (io.gitlab.theevilskeleton.Upscaler)
    float = true
    center = true
    pin = true
    size = 600 800
}

# Impression
windowrule {
    name = impression
    match:class = (io.gitlab.adhami3310.Impression)
    float = true
    center = true
    pin = true
    size = 600 800
}

# Proton Pass
windowrule {
    name = proton-pass
    match:class = (me.proton.Pass)
    float = true
    center = true
    size = 720 480
}

# Proton VPN
windowrule {
    name = proton-vpn
    match:class = (com.protonvpn.www)
    float = true
    pin = true
    size = 480 720
}

